- name: create a shared local administrator account
  win_user:
    name: "{{ user }}"
    password: "{{ password }}"
    state: present
    password_never_expires: true

- name: add the shared account to the local Administrators group
  win_group_membership:
    name: Administrators
    members:
      - "{{ user }}"
    state: present

- name: plant scheduled task with stored credentials (DPAPI loot)
  when: inventory_hostname == 'srv01'
  ansible.windows.win_powershell:
    script: |
      $action = New-ScheduledTaskAction -Execute "robocopy.exe" -Argument "\\192.168.100.149\backup C:\backup /mir"
      $trigger = New-ScheduledTaskTrigger -Weekly -DaysOfWeek Monday -At 2am
      Register-ScheduledTask -TaskName "Backup to 192.168.100.149" -Action $action -Trigger $trigger -User "{{ user }}" -Password "{{ password }}" -RunLevel Highest -Force
